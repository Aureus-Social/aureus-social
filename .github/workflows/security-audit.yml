name: Security Audit

on:
  schedule:
    - cron: '0 5 * * 1'  # Chaque lundi 05:00 UTC
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit
        id: audit
        run: |
          npm audit --json > audit-results.json 2>&1 || true
          CRITICAL=$(cat audit-results.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))" 2>/dev/null || echo 0)
          HIGH=$(cat audit-results.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('high',0))" 2>/dev/null || echo 0)
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "Critique: $CRITICAL | Haut: $HIGH"

      - name: Alert if vulnerabilities found
        if: steps.audit.outputs.critical > 0 || steps.audit.outputs.high > 0
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "alertes@aureussocial.be",
              "to": "info@aureus-ia.com",
              "subject": "🚨 Aureus — Vulnerabilites npm detectees",
              "html": "<h2>Audit npm - Vulnerabilites detectees</h2><p>Critique: ${{ steps.audit.outputs.critical }} | Haut: ${{ steps.audit.outputs.high }}</p><p>Lancer npm audit fix dans le repo.</p>"
            }' || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: audit-results.json
          retention-days: 30

  check-eval:
    name: Check eval() usage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for eval()
        run: |
          COUNT=$(grep -rn "\beval(" app/ --include="*.js" | grep -v "//\|evaluat\|'eval\|\"eval\|AuditSecurite\|admin\.js" | wc -l)
          echo "eval() occurrences trouvees: $COUNT"
          if [ "$COUNT" -gt "0" ]; then
            echo "⚠️ eval() detecte:"
            grep -rn "\beval(" app/ --include="*.js" | grep -v "//\|evaluat\|'eval\|\"eval\|AuditSecurite\|admin\.js"
          fi

  check-secrets:
    name: Check secrets exposure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for exposed secrets
        run: |
          # Vérifier qu'aucune clé secrète n'est commitée
          FOUND=0
          if grep -rn "sk-ant-api\|SUPABASE_SERVICE_ROLE\|eyJhbGciOiJIUzI1NiIs" app/ --include="*.js" | grep -v ".env\|process.env"; then
            FOUND=1
          fi
          if grep -rn "ghp_\|ghs_" . --include="*.js" --include="*.ts" | grep -v ".env\|node_modules\|.next"; then
            FOUND=1
          fi
          if [ "$FOUND" -gt "0" ]; then
            echo "🚨 ALERTE: Secrets potentiellement exposes dans le code!"
            exit 1
          fi
          echo "✅ Aucun secret expose detecte"
