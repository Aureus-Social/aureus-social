name: Backup Supabase Nocturne

on:
  schedule:
    - cron: "0 3 * * *"   # 3h00 UTC = 4h00 heure belge
  workflow_dispatch:        # Déclenchement manuel possible

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Installer PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Dump base Supabase
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" \
            --no-owner --no-acl | gzip > backup_${TIMESTAMP}.sql.gz
          echo "BACKUP_FILE=backup_${TIMESTAMP}.sql.gz" >> $GITHUB_ENV
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV
          SIZE=$(du -sh backup_${TIMESTAMP}.sql.gz | cut -f1)
          echo "BACKUP_SIZE=${SIZE}" >> $GITHUB_ENV

      - name: Upload vers Backblaze B2
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl private --exclude "*" --include "backup_*.sql.gz"
        env:
          AWS_S3_BUCKET: ${{ secrets.B2_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APP_KEY }}
          AWS_REGION: us-east-005
          AWS_S3_ENDPOINT: https://s3.us-east-005.backblazeb2.com
          SOURCE_DIR: ./
          DEST_DIR: aureus-backups/

      - name: Notification succès
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: info@aureus-ia.com
          subject: "✅ Backup Aureus — ${{ env.TIMESTAMP }}"
          body: |
            Backup nocturne Aureus Social Pro réussi.
            Fichier: ${{ env.BACKUP_FILE }}
            Taille: ${{ env.BACKUP_SIZE }}
            Stocké dans: Backblaze B2 / aureus-backups/
            Rétention: 30 jours.

      - name: Notification email si échec
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: info@aureus-ia.com
          subject: "🚨 ALERTE — Backup Aureus ÉCHOUÉ"
          body: |
            Le backup nocturne Aureus Social Pro a ÉCHOUÉ.
            Date: ${{ env.TIMESTAMP }}
            Vérifier: https://github.com/Aureus-Social/aureus-social/actions
            Action immédiate requise — risque de perte de données.
