name: Backup Supabase Nocturne
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Installer PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Dump base Supabase
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" --no-owner --no-acl | gzip > backup_${TIMESTAMP}.sql.gz
          echo "BACKUP_FILE=backup_${TIMESTAMP}.sql.gz" >> $GITHUB_ENV

      - name: Upload vers Backblaze B2
        env:
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APP_KEY: ${{ secrets.B2_APP_KEY }}
        run: |
          AUTH=$(curl -s -u "${B2_KEY_ID}:${B2_APP_KEY}" https://api.backblazeb2.com/b2api/v2/b2_authorize_account)
          echo $AUTH
          API_URL=$(echo $AUTH | python3 -c "import sys,json; print(json.load(sys.stdin)['apiUrl'])")
          AUTH_TOKEN=$(echo $AUTH | python3 -c "import sys,json; print(json.load(sys.stdin)['authorizationToken'])")
          BUCKET_ID="a57fa352d9b4c6dd9bce0512"
          UPLOAD_URL_RESP=$(curl -s -H "Authorization: $AUTH_TOKEN" "$API_URL/b2api/v2/b2_get_upload_url?bucketId=$BUCKET_ID")
          UPLOAD_URL=$(echo $UPLOAD_URL_RESP | python3 -c "import sys,json; print(json.load(sys.stdin)['uploadUrl'])")
          UPLOAD_TOKEN=$(echo $UPLOAD_URL_RESP | python3 -c "import sys,json; print(json.load(sys.stdin)['authorizationToken'])")
          FILE=${{ env.BACKUP_FILE }}
          SHA1=$(sha1sum $FILE | cut -d' ' -f1)
          SIZE=$(wc -c < $FILE)
          curl -s -H "Authorization: $UPLOAD_TOKEN" -H "X-Bz-File-Name: $FILE" -H "Content-Type: application/gzip" -H "Content-Length: $SIZE" -H "X-Bz-Content-Sha1: $SHA1" --data-binary @$FILE "$UPLOAD_URL"
          echo "Upload OK"

      - name: Done
        run: echo "Backup termine avec succes"
