name: Backup Supabase Nocturne
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Installer PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Dump base Supabase
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" --no-owner --no-acl | gzip > backup_${TIMESTAMP}.sql.gz
          echo "BACKUP_FILE=backup_${TIMESTAMP}.sql.gz" >> $GITHUB_ENV

      - name: Upload vers Backblaze B2
        run: |
          pip install b2 --quiet
          b2 authorize-account "${{ secrets.B2_KEY_ID }}" "${{ secrets.B2_APP_KEY }}"
          b2 upload-file "${{ secrets.B2_BUCKET_NAME }}" "${{ env.BACKUP_FILE }}" "aureus-backups/${{ env.BACKUP_FILE }}"

      - name: Done
        run: echo "Backup termine avec succes"
