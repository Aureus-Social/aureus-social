name: Backup Supabase Nocturne
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Installer outils
        run: sudo apt-get install -y postgresql-client rclone

      - name: Dump base Supabase
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" --no-owner --no-acl | gzip > backup_${TIMESTAMP}.sql.gz
          echo "BACKUP_FILE=backup_${TIMESTAMP}.sql.gz" >> $GITHUB_ENV

      - name: Configurer rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [b2]
          type = b2
          account = ${{ secrets.B2_KEY_ID }}
          key = ${{ secrets.B2_APP_KEY }}
          EOF

      - name: Upload vers Backblaze B2
        run: |
          rclone copy ${{ env.BACKUP_FILE }} b2:aureus-backups/ --b2-chunk-size 96M
          echo "Upload OK"

      - name: Done
        run: echo "Backup termine avec succes"
